<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>牠們在看｜角色集點系統</title>
  <style>
    @font-face {
      font-family: "Cubic11";
      src: url("./font/Cubic_11.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --ink: #2d244c;
      --violet: #4d3c78;
      --violet-soft: #6a5a97;
      --rose: #a06a8c;
      --rose-soft: #c78ba2;
      --cream: #efe8dd;
      --teal: #5fa7a5;
      --orange: #d78a61;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Cubic11", "Noto Sans TC", Arial, sans-serif;
      color: #fff;
      overflow-x: hidden;
      background: #000;
    }

    body { min-height: 100dvh; display: flex; flex-direction: column; }

    /* 背景層保持固定 */
    #bgLayer {
      position: fixed;
      inset: 0;
      background-image: url("./主背景.png");
      background-size: cover;
      background-position: center;
      z-index: 0;
      transition: background-image 0.5s ease;
    }

    #bgOverlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.2), rgba(0,0,0,0.8));
      z-index: 1;
      pointer-events: none;
    }

    .app {
      position: relative;
      z-index: 2;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px;
    }

    .screen {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .screen.active { display: flex; flex-direction: column; gap: 15px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .panel {
      background: rgba(45, 36, 76, 0.8);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* 選角頁面旋轉木馬優化 */
    .select-wrap { text-align: center; }
    .select-grid {
      display: flex;
      overflow-x: auto;
      gap: 15px;
      padding: 20px 10%;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
    }
    .select-grid::-webkit-scrollbar { display: none; }

    .char-card {
      flex: 0 0 240px;
      scroll-snap-align: center;
      transition: all 0.3s ease;
      opacity: 0.6;
      transform: scale(0.9);
      cursor: pointer;
    }
    .char-card.is-center { opacity: 1; transform: scale(1.05); border-color: var(--rose); }

    /* 主頁面佈局：手機直向堆疊，橫向並排 */
    .main-wrap {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
      width: 100%;
    }

    @media (min-width: 900px) {
      .main-wrap { grid-template-columns: 1.2fr 0.8fr; }
    }

    .hero-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 350px;
    }

    .avatar-wrap {
      width: 120px;
      height: 120px;
      font-size: 50px;
      background: var(--violet);
      border-radius: 30%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
      box-shadow: 0 0 20px var(--rose);
    }

    .telemetry-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      width: 100%;
      margin-top: 15px;
    }

    .telemetry-card {
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 12px;
      font-size: 12px;
    }

    .progress-list { display: flex; flex-direction: column; gap: 10px; }
    .bar { height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; }
    .bar-fill { height: 100%; transition: width 0.5s ease; }

    .btn {
      background: var(--rose);
      border: none;
      color: white;
      padding: 12px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }
    .btn.danger { background: #7e3240; }

    /* 隱藏旋轉提示，除非你真的想強制 */
    #rotateBlock {
      display: none;
      position: fixed; inset: 0; background: #000; z-index: 9999;
      flex-direction: column; align-items: center; justify-content: center;
    }

    @media (max-width: 600px) {
      .game-title { font-size: 20px; }
      .char-card { flex: 0 0 200px; }
    }
  </style>
</head>
<body>
  <div id="bgLayer"></div>
  <div id="bgOverlay"></div>

  <div class="app">
    <section id="selectScreen" class="screen active">
      <div class="panel select-wrap">
        <h1 class="game-title">請選擇觀測角色</h1>
        <div class="select-grid" id="selectGrid"></div>
        <button class="btn danger" id="clearAllFromSelect" style="margin-top:20px; max-width:200px">清除紀錄</button>
      </div>
    </section>

    <section id="mainScreen" class="screen">
      <div class="main-wrap">
        <div class="panel hero-panel">
          <div id="avatar" class="avatar-wrap"></div>
          <h2 id="avatarTitle" style="margin:5px 0"></h2>
          <p id="avatarName" style="color:var(--rose-soft); margin:0"></p>
          <p id="avatarSub" style="font-size:13px; opacity:0.8; max-width:300px"></p>
          
          <div class="telemetry-grid">
            <div class="telemetry-card">Archive: <strong id="telemetrySignal">--</strong></div>
            <div class="telemetry-card">State: <strong id="telemetryThreat">--</strong></div>
          </div>
          <div class="dots" id="dots" style="display:flex; gap:8px; margin-top:15px"></div>
          <div id="resultText" style="margin-top:10px; font-weight:bold; color:var(--teal)"></div>
        </div>

        <div class="panel side-panel">
          <h3>觀測進度</h3>
          <div id="progressList"></div>
          <div style="display:flex; flex-direction:column; gap:8px; margin-top:20px">
            <button class="btn" id="reselectBtn">更換角色</button>
            <button class="btn danger" id="resetCurrentBtn">重置進度</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    // 這裡保留你原本的 CHARACTERS 資料與邏輯
    const STORAGE_KEY = "they-are-watching-v2";
    const MAX_POINTS = 3;
    const WAITING_MS = 3000;
    const NEXT_URL = "https://example.com/next-page";

    const CHARACTERS = {
      char1: { title: "失焦者", name: "13號", icon: "◉", desc: "失焦於籠舍與視線之間", themeClass: "theme-1", fillClass: "fill-1", animClass: "animate-1", bg: "#2d244c" },
      char2: { title: "斷喙者", name: "喀喀", icon: "✦", desc: "帶著斷裂記憶與摩擦聲響", themeClass: "theme-2", fillClass: "fill-2", animClass: "animate-2", bg: "#7e3240" },
      char3: { title: "編碼觀測者", name: "C-98", icon: "▣", desc: "以監測與記錄為本能", themeClass: "theme-3", fillClass: "fill-3", animClass: "animate-3", bg: "#2d5163" },
      char4: { title: "羽封者", name: "小白", icon: "◌", desc: "羽色被馴化，動作卻仍保留微弱的浮升感", themeClass: "theme-4", fillClass: "fill-4", animClass: "animate-4", bg: "#9e8f85" },
      char5: { title: "孵夢者", name: "殼裡裡", icon: "◍", desc: "停留在殼與夢的邊界", themeClass: "theme-5", fillClass: "fill-5", animClass: "animate-5", bg: "#8d6e9d" },
      char6: { title: "啼鳴零號", name: "NONE", icon: "◎", desc: "最初與最末的呼鳴殘響", themeClass: "theme-6", fillClass: "fill-6", animClass: "animate-6", bg: "#201738" }
    };

    // 核心資料存取
    let userData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { selectedCharacter: null, scores: {}, lastScanTime: 0 };

    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(userData)); }

    function buildSelectCards() {
      const grid = document.getElementById("selectGrid");
      grid.innerHTML = "";
      Object.keys(CHARACTERS).forEach(key => {
        const char = CHARACTERS[key];
        const card = document.createElement("div");
        card.className = "panel char-card";
        card.innerHTML = `<div style="font-size:40px">${char.icon}</div><h3>${char.title}</h3><p>${char.name}</p>`;
        card.onclick = () => selectCharacter(key);
        grid.appendChild(card);
      });
      updateCarousel();
    }

    function updateCarousel() {
      const cards = document.querySelectorAll('.char-card');
      const container = document.getElementById('selectGrid');
      const center = container.scrollLeft + container.offsetWidth / 2;
      
      cards.forEach(card => {
        const cardCenter = card.offsetLeft + card.offsetWidth / 2;
        if (Math.abs(cardCenter - center) < 100) {
          card.classList.add('is-center');
        } else {
          card.classList.remove('is-center');
        }
      });
    }

    document.getElementById('selectGrid').addEventListener('scroll', updateCarousel);

    async function selectCharacter(key) {
      userData.selectedCharacter = key;
      if (!userData.scores[key]) userData.scores[key] = 0;
      saveData();
      renderMain();
    }

    function renderMain() {
      if (!userData.selectedCharacter) {
        document.getElementById("selectScreen").style.display = "flex";
        document.getElementById("mainScreen").style.display = "none";
        buildSelectCards();
        return;
      }

      document.getElementById("selectScreen").style.display = "none";
      document.getElementById("mainScreen").style.display = "flex";

      const char = CHARACTERS[userData.selectedCharacter];
      const score = userData.scores[userData.selectedCharacter] || 0;

      document.getElementById("avatar").textContent = char.icon;
      document.getElementById("avatarTitle").textContent = char.title;
      document.getElementById("avatarName").textContent = char.name;
      document.getElementById("avatarSub").textContent = char.desc;
      document.getElementById("telemetrySignal").textContent = (score / MAX_POINTS * 100) + "%";
      document.getElementById("telemetryThreat").textContent = score >= MAX_POINTS ? "UNLOCKED" : "LOCKED";

      // 點點顯示
      const dots = document.getElementById("dots");
      dots.innerHTML = "";
      for(let i=0; i<MAX_POINTS; i++) {
        const dot = document.createElement("div");
        dot.style.width = "12px"; dot.style.height = "12px"; dot.style.borderRadius = "50%";
        dot.style.background = i < score ? "var(--rose)" : "rgba(255,255,255,0.2)";
        dots.appendChild(dot);
      }

      // 進度條
      const prog = document.getElementById("progressList");
      prog.innerHTML = `
        <div style="margin-bottom:5px">觀測強度: ${score}/${MAX_POINTS}</div>
        <div class="bar"><div class="bar-fill" style="width:${(score/MAX_POINTS)*100}%; background:var(--rose)"></div></div>
      `;

      // 檢查是否從 QR 掃描進來 (scan=1)
      const params = new URLSearchParams(window.location.search);
      if (params.get("scan") === "1") {
        handleScan();
      }
    }

    async function handleScan() {
      const now = Date.now();
      const key = userData.selectedCharacter;
      if (now - userData.lastScanTime < WAITING_MS) {
        document.getElementById("resultText").textContent = "系統冷卻中...";
        return;
      }

      if (userData.scores[key] < MAX_POINTS) {
        userData.scores[key]++;
        userData.lastScanTime = now;
        saveData();
        document.getElementById("resultText").textContent = "觀測成功！";
        setTimeout(renderMain, 1000);
      }

      if (userData.scores[key] >= MAX_POINTS) {
        setTimeout(() => window.location.href = NEXT_URL, 2000);
      }
    }

    document.getElementById("reselectBtn").onclick = () => { userData.selectedCharacter = null; saveData(); renderMain(); };
    document.getElementById("resetCurrentBtn").onclick = () => { userData.scores[userData.selectedCharacter] = 0; saveData(); renderMain(); };
    document.getElementById("clearAllFromSelect").onclick = () => { localStorage.clear(); location.reload(); };

    // 初始化
    renderMain();
  </script>
</body>
</html>
