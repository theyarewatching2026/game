<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>牠們在看｜角色集點系統</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: "Noto Sans TC", Arial, sans-serif;
      color: #fff;
      overflow-x: hidden;
      overflow-y: auto;
      background: #000;
    }

    body {
      min-height: 100dvh;
    }

    #bgLayer {
      position: fixed;
      inset: 0;
      background-image: url("./主背景.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
      transition: background-image 0.4s ease;
    }

    #bgOverlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.18),
        rgba(0,0,0,0.42)
      );
      z-index: 1;
      pointer-events: none;
    }

    #rotateBlock {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.96);
      color: white;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .rotate-text {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      line-height: 1.6;
    }

    .app {
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: 100dvh;
      padding: max(8px, env(safe-area-inset-top)) max(8px, env(safe-area-inset-right)) max(8px, env(safe-area-inset-bottom)) max(8px, env(safe-area-inset-left));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screen {
      width: 100%;
      max-width: 1400px;
      display: none;
    }

    .screen.active {
      display: block;
    }

    .panel {
      background: rgba(18, 16, 34, 0.52);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 22px;
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.24);
    }

    /* 選角頁 */
    .select-wrap {
      width: 100%;
      padding: 14px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      min-height: calc(100dvh - 16px);
      max-height: calc(100dvh - 16px);
      overflow: hidden;
    }

    .title-box {
      text-align: center;
      padding: 0 8px;
    }

    .game-title {
      margin: 0;
      font-size: clamp(22px, 2.7vw, 36px);
      font-weight: 900;
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .game-subtitle {
      margin: 10px auto 0;
      max-width: 860px;
      line-height: 1.7;
      color: rgba(255,255,255,0.84);
      font-size: 14px;
    }

    .select-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      min-height: 0;
      align-content: stretch;
    }

    .char-card {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 14px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 126px;
      text-align: left;
      color: #fff;
    }

    .char-card:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.22);
    }

    .char-card.selected {
      border-color: rgba(255,255,255,0.34);
      background: rgba(255,255,255,0.13);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.06) inset;
    }

    .char-badge {
      width: 52px;
      height: 52px;
      margin-bottom: 10px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      box-shadow: 0 8px 16px rgba(0,0,0,0.20);
    }

    .char-title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.16;
      margin-bottom: 3px;
    }

    .char-name {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.88);
      margin-bottom: 6px;
    }

    .char-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.72);
      line-height: 1.45;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      color: white;
      padding: 11px 14px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }

    .btn:hover {
      background: rgba(255,255,255,0.14);
      transform: translateY(-1px);
    }

    .btn.danger {
      background: rgba(138, 43, 63, 0.28);
      border-color: rgba(255,255,255,0.12);
    }

    .btn.danger:hover {
      background: rgba(160, 48, 73, 0.38);
    }

    /* 主頁 */
    .main-wrap {
      width: 100%;
      min-height: calc(100dvh - 16px);
      max-height: calc(100dvh - 16px);
      display: grid;
      grid-template-columns: minmax(0, 1.65fr) minmax(250px, 0.85fr);
      gap: 10px;
      overflow: hidden;
    }

    .hero-panel {
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .hero-inner {
      width: 100%;
      text-align: center;
    }

    .avatar-wrap {
      width: clamp(84px, 10vw, 124px);
      height: clamp(84px, 10vw, 124px);
      margin: 0 auto;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(34px, 4.1vw, 50px);
      box-shadow: 0 14px 30px rgba(0,0,0,0.30);
      position: relative;
      overflow: hidden;
    }

    .avatar-title {
      margin-top: 10px;
      font-size: clamp(22px, 2.4vw, 32px);
      font-weight: 900;
      line-height: 1.08;
    }

    .avatar-name {
      margin-top: 2px;
      font-size: clamp(14px, 1.6vw, 18px);
      color: rgba(255,255,255,0.9);
      font-weight: 600;
    }

    .avatar-sub {
      margin: 8px auto 0;
      max-width: 500px;
      line-height: 1.55;
      color: rgba(255,255,255,0.82);
      font-size: clamp(12px, 1.2vw, 14px);
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 9px;
      margin-top: 14px;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.15);
      transition: transform 0.25s ease, background 0.25s ease;
    }

    .dot.active {
      background: #fff;
      transform: scale(1.1);
    }

    .result-text {
      margin-top: 12px;
      min-height: 24px;
      font-size: clamp(15px, 1.5vw, 18px);
      font-weight: 800;
    }

    .flash {
      animation: flashText 0.6s ease;
    }

    @keyframes flashText {
      0%   { transform: scale(0.92); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .side-panel {
      padding: 12px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .side-title {
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 800;
    }

    .info-item {
      padding: 10px;
      border-radius: 14px;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.08);
      line-height: 1.5;
      font-size: 12px;
      color: rgba(255,255,255,0.82);
    }

    .progress-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .progress-item {
      padding: 10px;
      border-radius: 14px;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px;
    }

    .progress-title {
      font-size: 13px;
      font-weight: 800;
      line-height: 1.2;
    }

    .progress-name {
      font-size: 11px;
      color: rgba(255,255,255,0.72);
      margin-top: 2px;
    }

    .bar {
      height: 7px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width 0.35s ease;
    }

    .actions-vertical {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: auto;
    }

    .actions-vertical .btn {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      border-radius: 15px;
    }

    .small {
      font-size: 12px;
      color: rgba(255,255,255,0.66);
    }

    /* 角色色塊 */
    .theme-1 { background: linear-gradient(135deg, #6f648e, #3b2f59); }
    .theme-2 { background: linear-gradient(135deg, #d1827b, #7e3240); }
    .theme-3 { background: linear-gradient(135deg, #55b7b2, #2d5163); }
    .theme-4 { background: linear-gradient(135deg, #e7d6c2, #9e8f85); color: #2c2440; }
    .theme-5 { background: linear-gradient(135deg, #ccb3d9, #8d6e9d); }
    .theme-6 { background: linear-gradient(135deg, #5c4e85, #201738); }

    .fill-1 { background: linear-gradient(90deg, #6f648e, #3b2f59); }
    .fill-2 { background: linear-gradient(90deg, #d1827b, #7e3240); }
    .fill-3 { background: linear-gradient(90deg, #55b7b2, #2d5163); }
    .fill-4 { background: linear-gradient(90deg, #e7d6c2, #9e8f85); }
    .fill-5 { background: linear-gradient(90deg, #ccb3d9, #8d6e9d); }
    .fill-6 { background: linear-gradient(90deg, #5c4e85, #201738); }

    /* 動畫 */
    .animate-1 { animation: emberBurst 1.15s ease forwards; }
    .animate-2 { animation: crackBounce 1.15s ease forwards; }
    .animate-3 { animation: novaSpin 1.15s ease forwards; }
    .animate-4 { animation: softRise 1.15s ease forwards; }
    .animate-5 { animation: dreamPulse 1.15s ease forwards; }
    .animate-6 { animation: zeroDrop 1.15s ease forwards; }

    @keyframes emberBurst {
      0%   { transform: scale(0.45) rotate(-14deg); opacity: 0; filter: blur(6px); }
      35%  { transform: scale(1.16) rotate(8deg); opacity: 1; filter: blur(0); }
      55%  { transform: scale(0.97) rotate(-4deg); }
      75%  { transform: scale(1.05) rotate(2deg); }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    @keyframes crackBounce {
      0%   { transform: translateY(40px) scale(0.8); opacity: 0; }
      35%  { transform: translateY(-14px) scale(1.05); opacity: 1; }
      60%  { transform: translateY(6px) scale(0.98); }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes novaSpin {
      0%   { transform: scale(0.15) rotate(180deg); opacity: 0; filter: blur(8px); }
      45%  { transform: scale(1.08) rotate(-10deg); opacity: 1; filter: blur(0); }
      70%  { transform: scale(0.96) rotate(6deg); }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    @keyframes softRise {
      0%   { transform: translateY(30px) scale(0.8); opacity: 0; }
      40%  { transform: translateY(-8px) scale(1.05); opacity: 1; }
      70%  { transform: translateY(2px) scale(0.98); }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes dreamPulse {
      0%   { transform: scale(0.7); opacity: 0; filter: blur(10px); }
      45%  { transform: scale(1.1); opacity: 1; filter: blur(0); }
      75%  { transform: scale(0.96); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes zeroDrop {
      0%   { transform: translateY(-100px) scaleY(1.3); opacity: 0; }
      35%  { transform: translateY(15px) scaleY(0.85); opacity: 1; }
      55%  { transform: translateY(-8px) scaleY(1.08); }
      100% { transform: translateY(0) scaleY(1); opacity: 1; }
    }

    /* 平板 */
    @media (max-width: 1024px) {
      .select-wrap,
      .main-wrap {
        min-height: calc(100dvh - 14px);
        max-height: calc(100dvh - 14px);
      }

      .select-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .main-wrap {
        grid-template-columns: 1.3fr 0.9fr;
      }
    }

    /* 手機橫向 */
    @media (max-width: 900px) and (orientation: landscape) {
      .app {
        padding: 8px;
      }

      .panel {
        border-radius: 18px;
      }

      .select-wrap {
        padding: 10px;
        gap: 8px;
      }

      .title-box {
        padding: 0 4px;
      }

      .game-title {
        font-size: clamp(20px, 2.5vw, 28px);
      }

      .select-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .char-card {
        min-height: 102px;
        padding: 10px;
        border-radius: 16px;
      }

      .char-badge {
        width: 42px;
        height: 42px;
        font-size: 20px;
        margin-bottom: 8px;
        border-radius: 11px;
      }

      .char-title {
        font-size: 15px;
      }

      .char-name {
        font-size: 12px;
        margin-bottom: 4px;
      }

      .char-desc {
        font-size: 11px;
        line-height: 1.35;
      }

      .btn {
        padding: 10px 12px;
        font-size: 13px;
      }

      .main-wrap {
        grid-template-columns: minmax(0, 1.55fr) minmax(220px, 0.82fr);
        gap: 8px;
      }

      .hero-panel,
      .side-panel {
        padding: 10px;
      }

      .avatar-wrap {
        width: 84px;
        height: 84px;
        font-size: 32px;
        border-radius: 20px;
      }

      .avatar-title {
        margin-top: 8px;
        font-size: 24px;
      }

      .avatar-name {
        font-size: 15px;
      }

      .avatar-sub {
        margin-top: 6px;
        max-width: 92%;
        font-size: 12px;
        line-height: 1.45;
      }

      .dots {
        gap: 8px;
        margin-top: 12px;
      }

      .dot {
        width: 12px;
        height: 12px;
      }

      .result-text {
        margin-top: 10px;
        min-height: 22px;
        font-size: 14px;
      }

      .side-title {
        font-size: 15px;
        margin-bottom: 6px;
      }

      .info-item,
      .progress-item {
        padding: 9px;
      }

      .progress-list {
        gap: 7px;
        margin-top: 8px;
      }

      .actions-vertical {
        gap: 7px;
      }

      .actions-vertical .btn {
        padding: 10px 12px;
        font-size: 13px;
      }
    }

    /* 更小的手機橫向 */
    @media (max-width: 760px) and (orientation: landscape) {
      .select-wrap,
      .main-wrap {
        min-height: calc(100dvh - 12px);
        max-height: calc(100dvh - 12px);
      }

      .game-title {
        font-size: 18px;
      }

      .select-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .char-card {
        min-height: 94px;
      }

      .char-badge {
        width: 38px;
        height: 38px;
        font-size: 18px;
        margin-bottom: 6px;
      }

      .char-title {
        font-size: 14px;
      }

      .char-desc {
        font-size: 10px;
      }

      .main-wrap {
        grid-template-columns: minmax(0, 1fr) 210px;
      }

      .avatar-wrap {
        width: 72px;
        height: 72px;
        font-size: 28px;
      }

      .avatar-title {
        font-size: 20px;
      }

      .avatar-name {
        font-size: 13px;
      }

      .avatar-sub {
        font-size: 11px;
      }

      .result-text {
        font-size: 13px;
      }

      .side-panel {
        gap: 8px;
      }

      .side-title {
        font-size: 14px;
      }

      .info-item {
        font-size: 11px;
      }

      .progress-title {
        font-size: 12px;
      }

      .progress-name,
      .small {
        font-size: 10px;
      }

      .actions-vertical .btn,
      .btn {
        font-size: 12px;
      }
    }

    /* 非常扁的手機橫向 */
    @media (max-height: 430px) and (orientation: landscape) {
      .select-wrap,
      .main-wrap {
        min-height: calc(100dvh - 10px);
        max-height: calc(100dvh - 10px);
      }

      .game-title {
        font-size: 18px;
      }

      .select-wrap {
        padding: 8px;
        gap: 6px;
      }

      .char-card {
        min-height: 82px;
        padding: 8px;
      }

      .char-badge {
        width: 34px;
        height: 34px;
        font-size: 16px;
        margin-bottom: 5px;
      }

      .char-title {
        font-size: 13px;
      }

      .char-name,
      .char-desc,
      .info-item,
      .result-text,
      .actions-vertical .btn,
      .btn {
        font-size: 11px;
      }

      .main-wrap {
        grid-template-columns: minmax(0, 1fr) 200px;
      }

      .hero-panel,
      .side-panel {
        padding: 8px;
      }

      .avatar-wrap {
        width: 64px;
        height: 64px;
        font-size: 24px;
        border-radius: 16px;
      }

      .avatar-title {
        margin-top: 6px;
        font-size: 18px;
      }

      .avatar-name {
        font-size: 12px;
      }

      .avatar-sub {
        margin-top: 4px;
        font-size: 10px;
        line-height: 1.35;
      }

      .dots {
        margin-top: 8px;
      }

      .dot {
        width: 10px;
        height: 10px;
      }

      .side-title {
        font-size: 13px;
      }

      .progress-item,
      .info-item {
        padding: 7px;
      }

      .actions-vertical .btn {
        padding: 8px 10px;
      }
    }

    /* 手機直向提示旋轉 */
    @media (max-width: 900px) and (orientation: portrait) {
      .app {
        visibility: hidden;
      }

      #rotateBlock {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div id="rotateBlock">
    <div class="rotate-text">請將手機橫向觀看</div>
  </div>

  <div id="bgLayer"></div>
  <div id="bgOverlay"></div>

  <div class="app">
    <!-- 選角頁 -->
    <section id="selectScreen" class="screen active">
      <div class="panel select-wrap">
        <div class="title-box">
          <h1 class="game-title">請選擇角色</h1>
        </div>

        <div class="select-grid" id="selectGrid"></div>

        <div class="actions">
          <button class="btn danger" id="clearAllFromSelect">清除全部紀錄</button>
        </div>
      </div>
    </section>

    <!-- 主頁 -->
    <section id="mainScreen" class="screen">
      <div class="main-wrap">
        <div class="panel hero-panel">
          <div class="hero-inner">
            <div id="avatar" class="avatar-wrap"></div>
            <div id="avatarTitle" class="avatar-title"></div>
            <div id="avatarName" class="avatar-name"></div>
            <div id="avatarSub" class="avatar-sub"></div>

            <div class="dots" id="dots"></div>
            <div class="result-text" id="resultText"></div>
          </div>
        </div>

        <div class="panel side-panel">
          <div>
            <h3 class="side-title">角色進度</h3>
            <div class="info-item small">
              掃描同一角色 QR code 可累積點數，集滿後會前往下一頁。
            </div>
            <div id="progressList" class="progress-list"></div>
          </div>

          <div class="actions actions-vertical">
            <button class="btn" id="resetCurrentBtn">重製本角色點數</button>
            <button class="btn" id="reselectBtn">重選角色</button>
            <button class="btn danger" id="clearAllBtn">清除全部紀錄</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "they-are-watching-v2";
    const MAX_POINTS = 3;
    const COOLDOWN_MS = 3000;

    // 集滿後跳轉網址
    const NEXT_URL = "https://example.com/next-page";

    const CHARACTERS = {
      char1: {
        title: "失焦者",
        name: "13號",
        icon: "◉",
        desc: "失焦於籠舍與視線之間",
        themeClass: "theme-1",
        fillClass: "fill-1",
        animClass: "animate-1",
        bg: "./NO.13&零號.gif"
      },
      char2: {
        title: "斷喙者",
        name: "喀喀",
        icon: "✦",
        desc: "帶著斷裂記憶與摩擦聲響",
        themeClass: "theme-2",
        fillClass: "fill-2",
        animClass: "animate-2",
        bg: "./喀喀.gif"
      },
      char3: {
        title: "編碼觀測者",
        name: "C-98",
        icon: "▣",
        desc: "以監測與記錄為本能",
        themeClass: "theme-3",
        fillClass: "fill-3",
        animClass: "animate-3",
        bg: "./小白&c-98.gif"
      },
      char4: {
        title: "羽封者",
        name: "小白",
        icon: "◌",
        desc: "羽色被馴化，動作卻仍保留微弱的浮升感",
        themeClass: "theme-4",
        fillClass: "fill-4",
        animClass: "animate-4",
        bg: "./小白&c-98.gif"
      },
      char5: {
        title: "孵夢者",
        name: "殼裡裡",
        icon: "◍",
        desc: "停留在殼與夢的邊界",
        themeClass: "theme-5",
        fillClass: "fill-5",
        animClass: "animate-5",
        bg: "./殼裡裡.gif"
      },
      char6: {
        title: "啼鳴零號",
        name: "",
        icon: "◎",
        desc: "最初與最末的呼鳴殘響",
        themeClass: "theme-6",
        fillClass: "fill-6",
        animClass: "animate-6",
        bg: "./NO.13&零號.gif"
      }
    };

    function checkOrientation() {
      const isPortrait = window.innerHeight > window.innerWidth;
      const block = document.getElementById("rotateBlock");

      if (window.innerWidth <= 900 && isPortrait) {
        block.style.display = "flex";
      } else {
        block.style.display = "none";
      }
    }

    window.addEventListener("resize", checkOrientation);
    window.addEventListener("orientationchange", checkOrientation);
    window.addEventListener("load", () => {
      setTimeout(() => {
        window.scrollTo(0, 1);
      }, 300);
      checkOrientation();
    });

    function getCharacterKeys() {
      return Object.keys(CHARACTERS);
    }

    function makeEmptyScores() {
      const scores = {};
      getCharacterKeys().forEach(key => {
        scores[key] = 0;
      });
      return scores;
    }

    function getDefaultData() {
      return {
        selectedCharacter: null,
        scores: makeEmptyScores(),
        lastScanTime: 0
      };
    }

    function normalizeScores(inputScores = {}) {
      const base = makeEmptyScores();
      getCharacterKeys().forEach(key => {
        base[key] = Number(inputScores[key]) || 0;
      });
      return base;
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return getDefaultData();
        const parsed = JSON.parse(raw);

        return {
          selectedCharacter: parsed.selectedCharacter || null,
          scores: normalizeScores(parsed.scores),
          lastScanTime: Number(parsed.lastScanTime) || 0
        };
      } catch (e) {
        return getDefaultData();
      }
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function clearData() {
      localStorage.removeItem(STORAGE_KEY);
    }

    function getIsScanEvent() {
      const params = new URLSearchParams(window.location.search);
      return params.get("scan") === "1";
    }

    function setSelectBackground() {
      document.getElementById("bgLayer").style.backgroundImage = 'url("./主背景.png")';
    }

    function setCharacterBackground(characterKey) {
      const char = CHARACTERS[characterKey];
      if (!char) return;
      document.getElementById("bgLayer").style.backgroundImage = `url("${char.bg}")`;
    }

    function showScreen(screenId) {
      document.querySelectorAll(".screen").forEach(el => el.classList.remove("active"));
      document.getElementById(screenId).classList.add("active");
    }

    function buildSelectCards() {
      const grid = document.getElementById("selectGrid");
      const current = loadData().selectedCharacter;
      grid.innerHTML = "";

      getCharacterKeys().forEach(key => {
        const char = CHARACTERS[key];
        const btn = document.createElement("button");
        btn.className = "char-card" + (current === key ? " selected" : "");
        btn.type = "button";
        btn.innerHTML = `
          <div class="char-badge ${char.themeClass}">${char.icon}</div>
          <div class="char-title">${char.title}</div>
          <div class="char-name">${char.name || "&nbsp;"}</div>
          <div class="char-desc">${char.desc}</div>
        `;
        btn.addEventListener("click", () => selectCharacter(key));
        grid.appendChild(btn);
      });
    }

    function buildProgressList(data) {
      const list = document.getElementById("progressList");
      if (!list) return;
      list.innerHTML = "";

      getCharacterKeys().forEach(key => {
        const char = CHARACTERS[key];
        const score = data.scores[key] || 0;

        const item = document.createElement("div");
        item.className = "progress-item";
        item.innerHTML = `
          <div class="progress-top">
            <div>
              <div class="progress-title">${char.title}</div>
              <div class="progress-name">${char.name || ""}</div>
            </div>
            <div>${score} / ${MAX_POINTS}</div>
          </div>
          <div class="bar">
            <div class="bar-fill ${char.fillClass}" style="width:${(score / MAX_POINTS) * 100}%"></div>
          </div>
        `;
        list.appendChild(item);
      });
    }

    function renderDots(score) {
      const dots = document.getElementById("dots");
      dots.innerHTML = "";
      for (let i = 0; i < MAX_POINTS; i++) {
        const el = document.createElement("div");
        el.className = "dot" + (i < score ? " active" : "");
        dots.appendChild(el);
      }
    }

    function renderCharacterView(data, message = "") {
      const selected = data.selectedCharacter;
      const char = CHARACTERS[selected];
      const score = data.scores[selected];

      setCharacterBackground(selected);

      const avatar = document.getElementById("avatar");
      avatar.className = `avatar-wrap ${char.themeClass}`;
      avatar.textContent = char.icon;

      document.getElementById("avatarTitle").textContent = char.title;
      document.getElementById("avatarName").textContent = char.name || "";
      document.getElementById("avatarSub").textContent = char.desc;

      const resultText = document.getElementById("resultText");
      resultText.textContent = message;
      resultText.classList.remove("flash");
      void resultText.offsetWidth;
      if (message) resultText.classList.add("flash");

      renderDots(score);
      buildProgressList(data);
    }

    function selectCharacter(characterKey) {
      const data = loadData();
      data.selectedCharacter = characterKey;
      saveData(data);

      buildSelectCards();
      showScreen("mainScreen");
      renderCharacterView(
        data,
        `已選擇 ${CHARACTERS[characterKey].title}${CHARACTERS[characterKey].name ? `・${CHARACTERS[characterKey].name}` : ""}`
      );
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function playAnimationAndAddPoint() {
      const data = loadData();
      const selected = data.selectedCharacter;
      const now = Date.now();

      showScreen("mainScreen");

      if (!selected) {
        setSelectBackground();
        showScreen("selectScreen");
        buildSelectCards();
        return;
      }

      const char = CHARACTERS[selected];

      renderCharacterView(data, "");

      if (data.scores[selected] >= MAX_POINTS) {
        renderCharacterView(data, `已完成 ${MAX_POINTS} / ${MAX_POINTS}`);
        await wait(1200);
        window.location.href = NEXT_URL;
        return;
      }

      if (now - data.lastScanTime < COOLDOWN_MS) {
        const remain = Math.ceil((COOLDOWN_MS - (now - data.lastScanTime)) / 1000);
        renderCharacterView(data, `冷卻中，請 ${remain} 秒後再掃`);
        return;
      }

      const avatar = document.getElementById("avatar");
      avatar.classList.remove("animate-1", "animate-2", "animate-3", "animate-4", "animate-5", "animate-6");
      void avatar.offsetWidth;
      avatar.classList.add(char.animClass);

      renderCharacterView(
        data,
        `已辨識 ${char.title}${char.name ? `・${char.name}` : ""}，播放動畫中...`
      );

      await wait(1200);

      data.scores[selected] = Math.min(data.scores[selected] + 1, MAX_POINTS);
      data.lastScanTime = now;
      saveData(data);

      const updatedScore = data.scores[selected];
      renderCharacterView(data, `+1 點！目前 ${updatedScore} / ${MAX_POINTS}`);
      buildSelectCards();

      if (updatedScore >= MAX_POINTS) {
        await wait(1400);
        renderCharacterView(data, "已集滿 3 點，準備跳轉...");
        await wait(1200);
        window.location.href = NEXT_URL;
      }
    }

    function renderNormalMain() {
      const data = loadData();
      if (!data.selectedCharacter) {
        setSelectBackground();
        showScreen("selectScreen");
        buildSelectCards();
        return;
      }
      showScreen("mainScreen");
      renderCharacterView(data, "");
    }

    function resetCurrentCharacterPoints() {
      const data = loadData();
      if (!data.selectedCharacter) return;
      data.scores[data.selectedCharacter] = 0;
      saveData(data);
      buildSelectCards();
      renderNormalMain();
    }

    function reselectCharacter() {
      const data = loadData();
      data.selectedCharacter = null;
      saveData(data);
      setSelectBackground();
      buildSelectCards();
      showScreen("selectScreen");
    }

    function init() {
      buildSelectCards();

      document.getElementById("resetCurrentBtn").addEventListener("click", resetCurrentCharacterPoints);
      document.getElementById("reselectBtn").addEventListener("click", reselectCharacter);
      document.getElementById("clearAllBtn").addEventListener("click", () => {
        clearData();
        location.reload();
      });
      document.getElementById("clearAllFromSelect").addEventListener("click", () => {
        clearData();
        location.reload();
      });

      const data = loadData();
      const isScanEvent = getIsScanEvent();

      if (!data.selectedCharacter) {
        setSelectBackground();
        showScreen("selectScreen");
        buildSelectCards();
        return;
      }

      if (isScanEvent) {
        playAnimationAndAddPoint();
      } else {
        renderNormalMain();
      }

      checkOrientation();
    }

    init();
  </script>
</body>
</html>
