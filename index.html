<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>牠們在看｜角色集點系統</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Noto Sans TC", Arial, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    body {
      background: #000;
    }

    #bgLayer {
      position: fixed;
      inset: 0;
      background-image: url("./主背景.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
      transition: background-image 0.4s ease;
    }

    #bgOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.32);
      z-index: 1;
      pointer-events: none;
    }

    .app {
      position: relative;
      z-index: 2;
      width: 100vw;
      height: 100vh;
      padding: 22px;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .screen {
      width: 100%;
      height: 100%;
      max-width: 1600px;
      display: none;
    }

    .screen.active {
      display: block;
    }

    .panel {
      background: rgba(15, 12, 30, 0.42);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 28px;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
    }

    .select-wrap {
      width: 100%;
      height: 100%;
      padding: 28px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 20px;
    }

    .title-box {
      text-align: center;
      padding: 10px 16px 0;
    }

    .game-title {
      margin: 0;
      font-size: clamp(32px, 5vw, 54px);
      font-weight: 900;
      letter-spacing: 0.06em;
    }

    .game-subtitle {
      margin: 12px auto 0;
      max-width: 860px;
      line-height: 1.8;
      color: rgba(255,255,255,0.86);
      font-size: 15px;
    }

    .select-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      min-height: 0;
    }

    @media (max-width: 1100px) {
      .select-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 760px) {
      .app {
        padding: 14px;
      }

      .select-grid {
        grid-template-columns: 1fr;
        overflow: auto;
      }
    }

    .char-card {
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      border-radius: 24px;
      padding: 18px;
      cursor: pointer;
      transition: transform 0.22s ease, background 0.22s ease, border-color 0.22s ease;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 180px;
    }

    .char-card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.22);
    }

    .char-badge {
      width: 74px;
      height: 74px;
      margin-bottom: 16px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(0,0,0,0.25);
    }

    .char-title {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .char-name {
      font-size: 18px;
      font-weight: 600;
      color: rgba(255,255,255,0.88);
      margin-bottom: 10px;
    }

    .char-desc {
      font-size: 14px;
      color: rgba(255,255,255,0.72);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
      color: white;
      padding: 11px 16px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn:hover {
      background: rgba(255,255,255,0.14);
    }

    .main-wrap {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1.8fr 1fr;
      gap: 20px;
    }

    @media (max-width: 980px) {
      .main-wrap {
        grid-template-columns: 1fr;
      }
    }

    .hero-panel {
      padding: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .hero-inner {
      width: 100%;
      text-align: center;
    }

    .avatar-wrap {
      width: 160px;
      height: 160px;
      margin: 0 auto;
      border-radius: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.35);
      position: relative;
      overflow: hidden;
    }

    .avatar-title {
      margin-top: 18px;
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 900;
      line-height: 1.15;
    }

    .avatar-name {
      margin-top: 6px;
      font-size: 20px;
      color: rgba(255,255,255,0.9);
      font-weight: 600;
    }

    .avatar-sub {
      margin: 12px auto 0;
      max-width: 620px;
      line-height: 1.8;
      color: rgba(255,255,255,0.8);
      font-size: 15px;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 24px;
    }

    .dot {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.15);
      transition: transform 0.25s ease, background 0.25s ease;
    }

    .dot.active {
      background: #fff;
      transform: scale(1.12);
    }

    .result-text {
      margin-top: 18px;
      min-height: 30px;
      font-size: 20px;
      font-weight: 800;
    }

    .flash {
      animation: flashText 0.6s ease;
    }

    @keyframes flashText {
      0%   { transform: scale(0.92); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .side-panel {
      padding: 24px;
      overflow: auto;
    }

    .side-title {
      margin: 0 0 14px;
      font-size: 24px;
      font-weight: 800;
    }

    .info-item {
      padding: 14px;
      border-radius: 18px;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 12px;
      line-height: 1.7;
      font-size: 14px;
      color: rgba(255,255,255,0.84);
    }

    .progress-list {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }

    .progress-item {
      padding: 14px;
      border-radius: 18px;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .progress-title {
      font-weight: 800;
      line-height: 1.2;
    }

    .progress-name {
      font-size: 13px;
      color: rgba(255,255,255,0.72);
      margin-top: 2px;
    }

    .bar {
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width 0.35s ease;
    }

    .small {
      font-size: 13px;
      color: rgba(255,255,255,0.66);
    }

    /* 角色色塊 */
    .theme-1 { background: linear-gradient(135deg, #6f648e, #3b2f59); }
    .theme-2 { background: linear-gradient(135deg, #d1827b, #7e3240); }
    .theme-3 { background: linear-gradient(135deg, #55b7b2, #2d5163); }
    .theme-4 { background: linear-gradient(135deg, #e7d6c2, #9e8f85); color: #2c2440; }
    .theme-5 { background: linear-gradient(135deg, #ccb3d9, #8d6e9d); }
    .theme-6 { background: linear-gradient(135deg, #5c4e85, #201738); }

    .fill-1 { background: linear-gradient(90deg, #6f648e, #3b2f59); }
    .fill-2 { background: linear-gradient(90deg, #d1827b, #7e3240); }
    .fill-3 { background: linear-gradient(90deg, #55b7b2, #2d5163); }
    .fill-4 { background: linear-gradient(90deg, #e7d6c2, #9e8f85); }
    .fill-5 { background: linear-gradient(90deg, #ccb3d9, #8d6e9d); }
    .fill-6 { background: linear-gradient(90deg, #5c4e85, #201738); }

    /* 動畫 */
    .animate-1 { animation: emberBurst 1.15s ease forwards; }
    .animate-2 { animation: crackBounce 1.15s ease forwards; }
    .animate-3 { animation: novaSpin 1.15s ease forwards; }
    .animate-4 { animation: softRise 1.15s ease forwards; }
    .animate-5 { animation: dreamPulse 1.15s ease forwards; }
    .animate-6 { animation: zeroDrop 1.15s ease forwards; }

    @keyframes emberBurst {
      0%   { transform: scale(0.45) rotate(-14deg); opacity: 0; filter: blur(6px); }
      35%  { transform: scale(1.16) rotate(8deg); opacity: 1; filter: blur(0); }
      55%  { transform: scale(0.97) rotate(-4deg); }
      75%  { transform: scale(1.05) rotate(2deg); }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    @keyframes crackBounce {
      0%   { transform: translateY(40px) scale(0.8); opacity: 0; }
      35%  { transform: translateY(-14px) scale(1.05); opacity: 1; }
      60%  { transform: translateY(6px) scale(0.98); }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes novaSpin {
      0%   { transform: scale(0.15) rotate(180deg); opacity: 0; filter: blur(8px); }
      45%  { transform: scale(1.08) rotate(-10deg); opacity: 1; filter: blur(0); }
      70%  { transform: scale(0.96) rotate(6deg); }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    @keyframes softRise {
      0%   { transform: translateY(30px) scale(0.8); opacity: 0; }
      40%  { transform: translateY(-8px) scale(1.05); opacity: 1; }
      70%  { transform: translateY(2px) scale(0.98); }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes dreamPulse {
      0%   { transform: scale(0.7); opacity: 0; filter: blur(10px); }
      45%  { transform: scale(1.1); opacity: 1; filter: blur(0); }
      75%  { transform: scale(0.96); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes zeroDrop {
      0%   { transform: translateY(-100px) scaleY(1.3); opacity: 0; }
      35%  { transform: translateY(15px) scaleY(0.85); opacity: 1; }
      55%  { transform: translateY(-8px) scaleY(1.08); }
      100% { transform: translateY(0) scaleY(1); opacity: 1; }
    }
    .side-panel-minimal {
  display: flex;
  align-items: center;
  justify-content: center;
}

.actions-vertical {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.actions-vertical .btn {
  width: 100%;
  padding: 16px 18px;
  font-size: 16px;
  border-radius: 18px;
}
#rotateBlock {
  position: fixed;
  inset: 0;
  background: #000;
  color: white;
  z-index: 9999;

  display: none;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.rotate-text {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: 2px;
}
  </style>
</head>
<body>
  <div id="rotateBlock">
  <div class="rotate-text">請將手機橫向觀看</div>
</div>
  <div id="bgLayer"></div>
  <div id="bgOverlay"></div>

  <div class="app">
    <!-- 選角頁 -->
    <section id="selectScreen" class="screen active">
      <div class="panel select-wrap">
        <div class="title-box">
          <h1 class="game-title">請選擇角色</h1>
                 </div>

        <div class="select-grid" id="selectGrid"></div>

        <div class="actions">
          <button class="btn" id="clearAllFromSelect">清除全部紀錄</button>
        </div>
      </div>
    </section>

    <!-- 主頁 -->
    <section id="mainScreen" class="screen">
      <div class="main-wrap">
        <div class="panel hero-panel">
          <div class="hero-inner">
            <div id="avatar" class="avatar-wrap"></div>
            <div id="avatarTitle" class="avatar-title"></div>
            <div id="avatarName" class="avatar-name"></div>
            <div id="avatarSub" class="avatar-sub"></div>

            <div class="dots" id="dots"></div>
            <div class="result-text" id="resultText"></div>
          </div>
        </div>

       <div class="panel side-panel side-panel-minimal">
  <div class="actions actions-vertical">
    <button class="btn" id="resetCurrentBtn">重製本角色點數</button>
    <button class="btn" id="reselectBtn">重選角色</button>
    <button class="btn" id="clearAllBtn">清除全部紀錄</button>
  </div>
</div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "they-are-watching-v2";
    const MAX_POINTS = 3;
    const COOLDOWN_MS = 3000;

    // 集滿後跳轉網址
    const NEXT_URL = "https://example.com/next-page";

    // 之後要改角色名稱、背景、描述，改這裡就好
    const CHARACTERS = {
      char1: {
        title: "失焦者",
        name: "13號",
        icon: "◉",
        desc: "失焦於籠舍與視線之間",
        themeClass: "theme-1",
        fillClass: "fill-1",
        animClass: "animate-1",
        bg: "./NO.13&零號.gif"
      },
      char2: {
        title: "斷喙者",
        name: "喀喀",
        icon: "✦",
        desc: "帶著斷裂記憶與摩擦聲響",
        themeClass: "theme-2",
        fillClass: "fill-2",
        animClass: "animate-2",
        bg: "./喀喀.gif"
      },
      char3: {
        title: "編碼觀測者",
        name: "C-98",
        icon: "▣",
        desc: "以監測與記錄為本能",
        themeClass: "theme-3",
        fillClass: "fill-3",
        animClass: "animate-3",
        bg: "./小白&c-98.gif"
      },
      char4: {
        title: "羽封者",
        name: "小白",
        icon: "◌",
        desc: "羽色被馴化，動作卻仍保留微弱的浮升感",
        themeClass: "theme-4",
        fillClass: "fill-4",
        animClass: "animate-4",
        bg: "./小白&c-98.gif"
      },
      char5: {
        title: "孵夢者",
        name: "殼裡裡",
        icon: "◍",
        desc: "停留在殼與夢的邊界",
        themeClass: "theme-5",
        fillClass: "fill-5",
        animClass: "animate-5",
        bg: "./殼裡裡.gif"
      },
      char6: {
        title: "啼鳴零號",
        name: "",
        icon: "◎",
        desc: "最初與最末的呼鳴殘響",
        themeClass: "theme-6",
        fillClass: "fill-6",
        animClass: "animate-6",
        bg: "./NO.13&零號.gif"
      }
    };
    function checkOrientation() {
  const isPortrait = window.innerHeight > window.innerWidth;
  const block = document.getElementById("rotateBlock");

  if (isPortrait) {
    block.style.display = "flex";
  } else {
    block.style.display = "none";
  }
}

window.addEventListener("resize", checkOrientation);
window.addEventListener("orientationchange", checkOrientation);

checkOrientation();
    function getCharacterKeys() {
      return Object.keys(CHARACTERS);
    }

    function makeEmptyScores() {
      const scores = {};
      getCharacterKeys().forEach(key => {
        scores[key] = 0;
      });
      return scores;
    }

    function getDefaultData() {
      return {
        selectedCharacter: null,
        scores: makeEmptyScores(),
        lastScanTime: 0
      };
    }

    function normalizeScores(inputScores = {}) {
      const base = makeEmptyScores();
      getCharacterKeys().forEach(key => {
        base[key] = Number(inputScores[key]) || 0;
      });
      return base;
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return getDefaultData();
        const parsed = JSON.parse(raw);

        return {
          selectedCharacter: parsed.selectedCharacter || null,
          scores: normalizeScores(parsed.scores),
          lastScanTime: Number(parsed.lastScanTime) || 0
        };
      } catch (e) {
        return getDefaultData();
      }
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function clearData() {
      localStorage.removeItem(STORAGE_KEY);
    }

    function getIsScanEvent() {
      const params = new URLSearchParams(window.location.search);
      return params.get("scan") === "1";
    }

    function setSelectBackground() {
      document.getElementById("bgLayer").style.backgroundImage = 'url("./主背景.png")';
    }

    function setCharacterBackground(characterKey) {
      const char = CHARACTERS[characterKey];
      if (!char) return;
      document.getElementById("bgLayer").style.backgroundImage = `url("${char.bg}")`;
    }

    function showScreen(screenId) {
      document.querySelectorAll(".screen").forEach(el => el.classList.remove("active"));
      document.getElementById(screenId).classList.add("active");
    }

    function buildSelectCards() {
      const grid = document.getElementById("selectGrid");
      grid.innerHTML = "";

      getCharacterKeys().forEach(key => {
        const char = CHARACTERS[key];
        const btn = document.createElement("button");
        btn.className = "char-card";
        btn.type = "button";
        btn.innerHTML = `
          <div class="char-badge ${char.themeClass}">${char.icon}</div>
          <div class="char-title">${char.title}</div>
          <div class="char-name">${char.name || "&nbsp;"}</div>
          <div class="char-desc">${char.desc}</div>
        `;
        btn.addEventListener("click", () => selectCharacter(key));
        grid.appendChild(btn);
      });
    }

    function buildProgressList(data) {
      const list = document.getElementById("progressList");
      list.innerHTML = "";

      getCharacterKeys().forEach(key => {
        const char = CHARACTERS[key];
        const score = data.scores[key] || 0;

        const item = document.createElement("div");
        item.className = "progress-item";
        item.innerHTML = `
          <div class="progress-top">
            <div>
              <div class="progress-title">${char.title}</div>
              <div class="progress-name">${char.name || ""}</div>
            </div>
            <div>${score} / ${MAX_POINTS}</div>
          </div>
          <div class="bar">
            <div class="bar-fill ${char.fillClass}" style="width:${(score / MAX_POINTS) * 100}%"></div>
          </div>
        `;
        list.appendChild(item);
      });
    }

    function renderDots(score) {
      const dots = document.getElementById("dots");
      dots.innerHTML = "";
      for (let i = 0; i < MAX_POINTS; i++) {
        const el = document.createElement("div");
        el.className = "dot" + (i < score ? " active" : "");
        dots.appendChild(el);
      }
    }

    function renderCharacterView(data, message = "", scanMessage = "") {
      const selected = data.selectedCharacter;
      const char = CHARACTERS[selected];
      const score = data.scores[selected];

      setCharacterBackground(selected);

      const avatar = document.getElementById("avatar");
      avatar.className = `avatar-wrap ${char.themeClass}`;
      avatar.textContent = char.icon;

      document.getElementById("avatarTitle").textContent = char.title;
      document.getElementById("avatarName").textContent = char.name || "";
      document.getElementById("avatarSub").textContent = char.desc;

      const resultText = document.getElementById("resultText");
      resultText.textContent = message;
      resultText.classList.remove("flash");
      void resultText.offsetWidth;
      if (message) resultText.classList.add("flash");

     
      renderDots(score);
      buildProgressList(data);
    }

    function selectCharacter(characterKey) {
      const data = loadData();
      data.selectedCharacter = characterKey;
      saveData(data);

      showScreen("mainScreen");
      renderCharacterView(
        data,
        `已選擇 ${CHARACTERS[characterKey].title}${CHARACTERS[characterKey].name ? `・${CHARACTERS[characterKey].name}` : ""}`,
        "角色已綁定。下次再掃同一個 QR code，才會播放動畫並加點。"
      );
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function playAnimationAndAddPoint() {
      const data = loadData();
      const selected = data.selectedCharacter;
      const char = CHARACTERS[selected];
      const now = Date.now();

      showScreen("mainScreen");

      if (!selected) {
        setSelectBackground();
        showScreen("selectScreen");
        return;
      }

      renderCharacterView(
        data,
        "",
        "已偵測到掃碼事件，準備播放動畫..."
      );

      if (data.scores[selected] >= MAX_POINTS) {
        renderCharacterView(
          data,
          `已完成 ${MAX_POINTS} / ${MAX_POINTS}`,
          "已經集滿點數，將直接跳轉。"
        );
        await wait(1200);
        window.location.href = NEXT_URL;
        return;
      }

      if (now - data.lastScanTime < COOLDOWN_MS) {
        const remain = Math.ceil((COOLDOWN_MS - (now - data.lastScanTime)) / 1000);
        renderCharacterView(
          data,
          `冷卻中，請 ${remain} 秒後再掃`,
          "為避免重複加點，系統暫時不加點。"
        );
        return;
      }

      const avatar = document.getElementById("avatar");
      avatar.classList.remove("animate-1", "animate-2", "animate-3", "animate-4", "animate-5", "animate-6");
      void avatar.offsetWidth;
      avatar.classList.add(char.animClass);

      renderCharacterView(
        data,
        "播放角色動畫中...",
        `已辨識角色：${char.title}${char.name ? `・${char.name}` : ""}，動畫結束後將加 1 點。`
      );

      await wait(1200);

      data.scores[selected] = Math.min(data.scores[selected] + 1, MAX_POINTS);
      data.lastScanTime = now;
      saveData(data);

      const updatedScore = data.scores[selected];
      renderCharacterView(
        data,
        `+1 點！目前 ${updatedScore} / ${MAX_POINTS}`,
        "本次掃碼已成功加點。"
      );

      if (updatedScore >= MAX_POINTS) {
        await wait(1400);
        renderCharacterView(
          data,
          "已集滿 3 點，準備跳轉...",
          "完成條件已達成，即將前往下一頁。"
        );
        await wait(1200);
        window.location.href = NEXT_URL;
      }
    }

    function renderNormalMain() {
      const data = loadData();
      if (!data.selectedCharacter) {
        setSelectBackground();
        showScreen("selectScreen");
        return;
      }
      showScreen("mainScreen");
      renderCharacterView(
        data,
        "",
        "這次不是掃碼事件，因此只顯示目前狀態。"
      );
    }

    function resetCurrentCharacterPoints() {
      const data = loadData();
      if (!data.selectedCharacter) return;
      data.scores[data.selectedCharacter] = 0;
      saveData(data);
      renderNormalMain();
    }

    function reselectCharacter() {
      const data = loadData();
      data.selectedCharacter = null;
      saveData(data);
      setSelectBackground();
      showScreen("selectScreen");
    }

    function init() {
      buildSelectCards();

      document.getElementById("resetCurrentBtn").addEventListener("click", resetCurrentCharacterPoints);
      document.getElementById("reselectBtn").addEventListener("click", reselectCharacter);
      document.getElementById("clearAllBtn").addEventListener("click", () => {
        clearData();
        location.reload();
      });
      document.getElementById("clearAllFromSelect").addEventListener("click", () => {
        clearData();
        location.reload();
      });

      const data = loadData();
      const isScanEvent = getIsScanEvent();

      if (!data.selectedCharacter) {
        setSelectBackground();
        showScreen("selectScreen");
        return;
      }

      if (isScanEvent) {
        playAnimationAndAddPoint();
      } else {
        renderNormalMain();
      }
    }

    init();
  </script>
</body>
</html>
