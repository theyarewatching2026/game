<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>牠們在看｜角色集點系統</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: "Noto Sans TC", Arial, sans-serif;
      color: #fff;
      overflow-x: hidden;
      overflow-y: auto;
      background: #000;
    }

    body {
      min-height: 100dvh;
      scroll-behavior: smooth;
    }

    #bgLayer {
      position: fixed;
      inset: 0;
      background-image: url("./主背景.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
      transition: background-image 0.4s ease;
    }

    #bgOverlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.18),
        rgba(0,0,0,0.42)
      );
      z-index: 1;
      pointer-events: none;
    }

    #rotateBlock {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.96);
      color: white;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .rotate-text {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      line-height: 1.6;
    }

    .app {
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: 100dvh;
      padding: 12px 12px max(120px, 16vh);
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .screen {
      width: 100%;
      max-width: 1400px;
      display: none;
    }

    .screen.active {
      display: block;
    }

    .panel {
      background: rgba(18, 16, 34, 0.56);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      backdrop-filter: blur(12px);
      box-shadow: 0 14px 36px rgba(0,0,0,0.28);
    }

    .screen {
      margin: 0 auto;
    }

    .screen.active {
      animation: screenReveal 0.5s ease;
    }

    @keyframes screenReveal {
      0% { opacity: 0; transform: translateY(18px) scale(0.985); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .page-bottom-space {
      height: clamp(100px, 16vh, 170px);
      pointer-events: none;
    }

    /* 選角頁 */
    .select-wrap {
      width: 100%;
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
      min-height: calc(100dvh - 24px);
    }

    .title-box {
      text-align: center;
      padding: 4px 8px 0;
    }

    .game-title {
      margin: 0;
      font-size: clamp(24px, 3.4vw, 42px);
      font-weight: 900;
      letter-spacing: 0.05em;
    }

    .game-subtitle {
      margin: 10px auto 0;
      max-width: 860px;
      line-height: 1.7;
      color: rgba(255,255,255,0.84);
      font-size: 14px;
    }

    .select-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      min-height: 0;
    }

    .char-card {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 16px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 148px;
      text-align: left;
      color: #fff;
    }

    .char-card:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.22);
    }

    .char-card.selected {
      border-color: rgba(255,255,255,0.34);
      background: rgba(255,255,255,0.13);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.06) inset;
    }

    .char-badge {
      width: 58px;
      height: 58px;
      margin-bottom: 12px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(0,0,0,0.22);
    }

    .char-title {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .char-name {
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,255,255,0.88);
      margin-bottom: 8px;
    }

    .char-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.72);
      line-height: 1.6;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      color: white;
      padding: 12px 16px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }

    .btn:hover {
      background: rgba(255,255,255,0.14);
      transform: translateY(-1px);
    }

    .btn.danger {
      background: rgba(138, 43, 63, 0.28);
      border-color: rgba(255,255,255,0.12);
    }

    .btn.danger:hover {
      background: rgba(160, 48, 73, 0.38);
    }

    /* 主頁 */
    .main-wrap {
      width: 100%;
      min-height: calc(100dvh - 24px);
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(240px, 0.8fr);
      gap: 10px;
    }

    .hero-panel {
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .hero-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 18%, rgba(98, 210, 232, 0.14), transparent 32%),
        radial-gradient(circle at 82% 74%, rgba(207, 104, 160, 0.10), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.06), transparent 28%, transparent 72%, rgba(255,255,255,0.04));
      opacity: 0.95;
      pointer-events: none;
      z-index: -2;
    }

    .hero-panel::after {
      content: "";
      position: absolute;
      inset: -10% -35%;
      background: linear-gradient(100deg, transparent 0%, rgba(126, 226, 255, 0.07) 42%, rgba(255,255,255,0.12) 50%, rgba(202, 117, 204, 0.08) 58%, transparent 100%);
      transform: translateX(-46%);
      animation: panelSweep 6.5s linear infinite;
      pointer-events: none;
      z-index: -1;
      mix-blend-mode: screen;
    }

    .hero-inner {
      width: 100%;
      text-align: center;
      max-width: 560px;
      margin: 0 auto;
      position: relative;
      animation: innerFloat 5.2s ease-in-out infinite;
    }

    .avatar-wrap {
      width: clamp(84px, 10.5vw, 116px);
      height: clamp(84px, 10.5vw, 116px);
      margin: 0 auto;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(36px, 4vw, 48px);
      box-shadow: 0 14px 28px rgba(0,0,0,0.34), 0 0 0 1px rgba(255,255,255,0.12) inset;
      position: relative;
      overflow: hidden;
      isolation: isolate;
      transform: translateZ(0);
    }

    .avatar-wrap::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.04) 28%, rgba(255,255,255,0.02) 100%),
        repeating-linear-gradient(180deg, rgba(255,255,255,0.06) 0 1px, transparent 1px 6px);
      opacity: 0.42;
      pointer-events: none;
      z-index: -1;
    }

    .avatar-wrap::after {
      content: "";
      position: absolute;
      left: 10%;
      right: 10%;
      top: -22%;
      height: 24%;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(137, 246, 255, 0.0), rgba(137, 246, 255, 0.55), rgba(255,255,255,0.06));
      filter: blur(5px);
      opacity: 0.9;
      animation: scanBeam 3.4s ease-in-out infinite;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .avatar-title {
      margin-top: 10px;
      font-size: clamp(20px, 2.5vw, 28px);
      font-weight: 900;
      line-height: 1.12;
    }

    .avatar-name {
      margin-top: 4px;
      font-size: clamp(13px, 1.6vw, 16px);
      color: rgba(255,255,255,0.9);
      font-weight: 600;
    }

    .avatar-sub {
      margin: 8px auto 0;
      max-width: 480px;
      line-height: 1.6;
      color: rgba(255,255,255,0.82);
      font-size: 13px;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 12px;
    }

    .dot {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.15);
      transition: transform 0.25s ease, background 0.25s ease;
    }

    .dot.active {
      background: #fff;
      transform: scale(1.1);
    }

    .result-text {
      margin-top: 10px;
      min-height: 24px;
      font-size: 16px;
      font-weight: 800;
      text-shadow: 0 0 14px rgba(255,255,255,0.15);
    }

    .flash {
      animation: flashText 0.6s ease;
    }

    .signal-text {
      animation: signalGlitch 0.55s steps(2, end) 1;
    }

    @keyframes flashText {
      0%   { transform: scale(0.92); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .side-panel {
      padding: 10px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .side-title {
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 800;
    }

    .info-item {
      padding: 12px;
      border-radius: 16px;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.08);
      line-height: 1.65;
      font-size: 13px;
      color: rgba(255,255,255,0.82);
    }

    .progress-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .progress-item {
      padding: 12px;
      border-radius: 16px;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .progress-title {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.2;
    }

    .progress-name {
      font-size: 12px;
      color: rgba(255,255,255,0.72);
      margin-top: 2px;
    }

    .bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width 0.35s ease;
    }

    .actions-vertical {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: auto;
    }

    .actions-vertical .btn {
      width: 100%;
      padding: 10px 12px;
      font-size: 13px;
      border-radius: 14px;
    }

    .small {
      font-size: 12px;
      color: rgba(255,255,255,0.66);
    }

    /* 角色色塊 */
    .theme-1 { background: linear-gradient(135deg, #6f648e, #3b2f59); }
    .theme-2 { background: linear-gradient(135deg, #d1827b, #7e3240); }
    .theme-3 { background: linear-gradient(135deg, #55b7b2, #2d5163); }
    .theme-4 { background: linear-gradient(135deg, #e7d6c2, #9e8f85); color: #2c2440; }
    .theme-5 { background: linear-gradient(135deg, #ccb3d9, #8d6e9d); }
    .theme-6 { background: linear-gradient(135deg, #5c4e85, #201738); }

    .fill-1 { background: linear-gradient(90deg, #6f648e, #3b2f59); }
    .fill-2 { background: linear-gradient(90deg, #d1827b, #7e3240); }
    .fill-3 { background: linear-gradient(90deg, #55b7b2, #2d5163); }
    .fill-4 { background: linear-gradient(90deg, #e7d6c2, #9e8f85); }
    .fill-5 { background: linear-gradient(90deg, #ccb3d9, #8d6e9d); }
    .fill-6 { background: linear-gradient(90deg, #5c4e85, #201738); }

    /* 動畫 */
    .animate-1 { animation: focusLock 1.2s cubic-bezier(.2,.8,.2,1) forwards; }
    .animate-2 { animation: glitchPeck 1.05s cubic-bezier(.18,.82,.24,1) forwards; }
    .animate-3 { animation: monitorScan 1.18s cubic-bezier(.2,.8,.2,1) forwards; }
    .animate-4 { animation: featherLift 1.16s cubic-bezier(.2,.8,.2,1) forwards; }
    .animate-5 { animation: cocoonDream 1.22s cubic-bezier(.2,.8,.2,1) forwards; }
    .animate-6 { animation: signalDrop 1.16s cubic-bezier(.2,.8,.2,1) forwards; }

    @keyframes focusLock {
      0%   { transform: scale(0.92); filter: blur(8px) brightness(0.85); opacity: 0.55; }
      32%  { transform: scale(1.07) rotate(-2deg); filter: blur(1px) brightness(1.12); opacity: 1; }
      55%  { transform: scale(0.98) rotate(1deg); }
      78%  { transform: scale(1.03); }
      100% { transform: scale(1); filter: blur(0) brightness(1); opacity: 1; }
    }

    @keyframes glitchPeck {
      0%   { transform: translateX(0) scale(0.88); opacity: 0.4; filter: blur(3px); }
      16%  { transform: translateX(-8px) scale(1.03); }
      28%  { transform: translateX(8px) scale(1.08); }
      40%  { transform: translateX(-4px) scale(0.98); }
      56%  { transform: translateX(4px) scale(1.02); }
      100% { transform: translateX(0) scale(1); opacity: 1; filter: blur(0); }
    }

    @keyframes monitorScan {
      0%   { transform: perspective(500px) rotateX(22deg) scale(0.72); opacity: 0; filter: blur(5px); }
      34%  { transform: perspective(500px) rotateX(-6deg) scale(1.1); opacity: 1; filter: blur(0); }
      58%  { transform: perspective(500px) rotateX(4deg) scale(0.98); }
      100% { transform: perspective(500px) rotateX(0) scale(1); opacity: 1; }
    }

    @keyframes featherLift {
      0%   { transform: translateY(18px) scale(0.85); opacity: 0; filter: blur(6px); }
      34%  { transform: translateY(-12px) scale(1.06); opacity: 1; filter: blur(0); }
      56%  { transform: translateY(4px) scale(0.98); }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes cocoonDream {
      0%   { transform: scale(0.78); opacity: 0.35; filter: blur(10px) saturate(0.8); }
      42%  { transform: scale(1.12); opacity: 1; filter: blur(0) saturate(1.18); }
      68%  { transform: scale(0.96); }
      100% { transform: scale(1); opacity: 1; filter: blur(0) saturate(1); }
    }

    @keyframes signalDrop {
      0%   { transform: translateY(-72px) scaleY(1.24); opacity: 0; filter: blur(6px); }
      34%  { transform: translateY(10px) scaleY(0.86); opacity: 1; filter: blur(0); }
      58%  { transform: translateY(-4px) scaleY(1.08); }
      100% { transform: translateY(0) scaleY(1); opacity: 1; }
    }

    @keyframes panelSweep {
      0% { transform: translateX(-46%) skewX(-10deg); }
      100% { transform: translateX(46%) skewX(-10deg); }
    }

    @keyframes innerFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes scanBeam {
      0%, 100% { top: -22%; opacity: 0.0; }
      18% { opacity: 0.78; }
      52% { opacity: 0.92; }
      100% { top: 98%; opacity: 0.0; }
    }

    @keyframes signalGlitch {
      0% { transform: translateX(0); filter: blur(0); }
      20% { transform: translateX(-2px); filter: blur(1px); }
      40% { transform: translateX(2px); }
      60% { transform: translateX(-1px); }
      100% { transform: translateX(0); filter: blur(0); }
    }
    /* 平板 */
    @media (max-width: 1024px) {
      .select-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .main-wrap {
        grid-template-columns: 1.15fr 0.85fr;
      }
    }

    /* 手機橫向 */
    @media (max-width: 900px) and (orientation: landscape) {
      .app {
        padding: 10px 10px max(90px, 14vh);
      }

      .select-wrap,
      .main-wrap {
        min-height: calc(100dvh - 20px);
      }

      .select-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .char-card {
        min-height: 128px;
        padding: 12px;
      }

      .char-badge {
        width: 46px;
        height: 46px;
        font-size: 22px;
        margin-bottom: 10px;
        border-radius: 12px;
      }

      .char-title {
        font-size: 16px;
      }

      .char-name {
        font-size: 13px;
        margin-bottom: 6px;
      }

      .char-desc {
        font-size: 12px;
        line-height: 1.45;
      }

      .main-wrap {
        grid-template-columns: 1.18fr 0.82fr;
        gap: 8px;
      }

      .hero-panel {
        padding: 10px;
      }

      .side-panel {
        padding: 10px;
      }

      .avatar-sub {
        max-width: 92%;
        font-size: 12px;
        line-height: 1.5;
      }

      .actions-vertical .btn {
        padding: 9px 12px;
        font-size: 12px;
      }
    }

    /* 更小的手機橫向 */
    @media (max-width: 760px) and (orientation: landscape) {
      .game-title {
        font-size: 22px;
      }

      .select-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .main-wrap {
        grid-template-columns: 1fr 230px;
      }

      .avatar-title {
        font-size: 22px;
      }

      .avatar-name {
        font-size: 14px;
      }

      .result-text {
        font-size: 15px;
      }
    }

    /* 手機直向提示旋轉 */
    @media (max-width: 900px) and (orientation: portrait) {
      .app {
        visibility: hidden;
      }

      #rotateBlock {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div id="rotateBlock">
    <div class="rotate-text">請將手機橫向觀看</div>
  </div>

  <div id="bgLayer"></div>
  <div id="bgOverlay"></div>

  <div class="app">
    <!-- 選角頁 -->
    <section id="selectScreen" class="screen active">
      <div class="panel select-wrap">
        <div class="title-box">
          <h1 class="game-title">請選擇角色</h1>
        </div>

        <div class="select-grid" id="selectGrid"></div>

        <div class="actions">
          <button class="btn danger" id="clearAllFromSelect">清除全部紀錄</button>
        </div>
      </div>
    </section>

    <!-- 主頁 -->
    <section id="mainScreen" class="screen">
      <div class="main-wrap">
        <div class="panel hero-panel">
          <div class="hero-inner">
            <div id="avatar" class="avatar-wrap"></div>
            <div id="avatarTitle" class="avatar-title"></div>
            <div id="avatarName" class="avatar-name"></div>
            <div id="avatarSub" class="avatar-sub"></div>

            <div class="dots" id="dots"></div>
            <div class="result-text" id="resultText"></div>
          </div>
        </div>

        <div class="panel side-panel">
          <div>
            <h3 class="side-title">我的進度</h3>
            <div class="info-item small">
              掃描同一角色 QR code 可累積點數，集滿後會前往下一頁。
            </div>
            <div id="progressList" class="progress-list"></div>
          </div>

          <div class="actions actions-vertical">
            <button class="btn" id="resetCurrentBtn">重製本角色點數</button>
            <button class="btn" id="reselectBtn">重選角色</button>
            <button class="btn danger" id="clearAllBtn">清除全部紀錄</button>
          </div>
        </div>
      </div>
      <div class="page-bottom-space"></div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "they-are-watching-v2";
    const MAX_POINTS = 3;
    const COOLDOWN_MS = 3000;

    // 集滿後跳轉網址
    const NEXT_URL = "https://example.com/next-page";

    const CHARACTERS = {
      char1: {
        title: "失焦者",
        name: "13號",
        icon: "◉",
        desc: "失焦於籠舍與視線之間",
        themeClass: "theme-1",
        fillClass: "fill-1",
        animClass: "animate-1",
        bg: "./NO.13&零號.gif"
      },
      char2: {
        title: "斷喙者",
        name: "喀喀",
        icon: "✦",
        desc: "帶著斷裂記憶與摩擦聲響",
        themeClass: "theme-2",
        fillClass: "fill-2",
        animClass: "animate-2",
        bg: "./喀喀.gif"
      },
      char3: {
        title: "編碼觀測者",
        name: "C-98",
        icon: "▣",
        desc: "以監測與記錄為本能",
        themeClass: "theme-3",
        fillClass: "fill-3",
        animClass: "animate-3",
        bg: "./小白&c-98.gif"
      },
      char4: {
        title: "羽封者",
        name: "小白",
        icon: "◌",
        desc: "羽色被馴化，動作卻仍保留微弱的浮升感",
        themeClass: "theme-4",
        fillClass: "fill-4",
        animClass: "animate-4",
        bg: "./小白&c-98.gif"
      },
      char5: {
        title: "孵夢者",
        name: "殼裡裡",
        icon: "◍",
        desc: "停留在殼與夢的邊界",
        themeClass: "theme-5",
        fillClass: "fill-5",
        animClass: "animate-5",
        bg: "./殼裡裡.gif"
      },
      char6: {
        title: "啼鳴零號",
        name: "",
        icon: "◎",
        desc: "最初與最末的呼鳴殘響",
        themeClass: "theme-6",
        fillClass: "fill-6",
        animClass: "animate-6",
        bg: "./NO.13&零號.gif"
      }
    };

    function checkOrientation() {
      const isPortrait = window.innerHeight > window.innerWidth;
      const block = document.getElementById("rotateBlock");

      if (window.innerWidth <= 900 && isPortrait) {
        block.style.display = "flex";
      } else {
        block.style.display = "none";
      }
    }

    window.addEventListener("resize", checkOrientation);
    window.addEventListener("orientationchange", checkOrientation);
    window.addEventListener("load", () => {
      setTimeout(() => {
        window.scrollTo(0, 1);
      }, 300);
      checkOrientation();
    });

    function getCharacterKeys() {
      return Object.keys(CHARACTERS);
    }

    function makeEmptyScores() {
      const scores = {};
      getCharacterKeys().forEach(key => {
        scores[key] = 0;
      });
      return scores;
    }

    function getDefaultData() {
      return {
        selectedCharacter: null,
        scores: makeEmptyScores(),
        lastScanTime: 0
      };
    }

    function normalizeScores(inputScores = {}) {
      const base = makeEmptyScores();
      getCharacterKeys().forEach(key => {
        base[key] = Number(inputScores[key]) || 0;
      });
      return base;
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return getDefaultData();
        const parsed = JSON.parse(raw);

        return {
          selectedCharacter: parsed.selectedCharacter || null,
          scores: normalizeScores(parsed.scores),
          lastScanTime: Number(parsed.lastScanTime) || 0
        };
      } catch (e) {
        return getDefaultData();
      }
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function clearData() {
      localStorage.removeItem(STORAGE_KEY);
    }

    function getIsScanEvent() {
      const params = new URLSearchParams(window.location.search);
      return params.get("scan") === "1";
    }

    function setSelectBackground() {
      document.getElementById("bgLayer").style.backgroundImage = 'url("./主背景.png")';
    }

    function setCharacterBackground(characterKey) {
      const char = CHARACTERS[characterKey];
      if (!char) return;
      document.getElementById("bgLayer").style.backgroundImage = `url("${char.bg}")`;
    }

    function showScreen(screenId) {
      document.querySelectorAll(".screen").forEach(el => el.classList.remove("active"));
      document.getElementById(screenId).classList.add("active");
    }

    function buildSelectCards() {
      const grid = document.getElementById("selectGrid");
      const current = loadData().selectedCharacter;
      grid.innerHTML = "";

      getCharacterKeys().forEach(key => {
        const char = CHARACTERS[key];
        const btn = document.createElement("button");
        btn.className = "char-card" + (current === key ? " selected" : "");
        btn.type = "button";
        btn.innerHTML = `
          <div class="char-badge ${char.themeClass}">${char.icon}</div>
          <div class="char-title">${char.title}</div>
          <div class="char-name">${char.name || "&nbsp;"}</div>
          <div class="char-desc">${char.desc}</div>
        `;
        btn.addEventListener("click", () => selectCharacter(key));
        grid.appendChild(btn);
      });
    }

    function buildProgressList(data) {
      const list = document.getElementById("progressList");
      if (!list) return;
      list.innerHTML = "";

      const key = data.selectedCharacter;
      if (!key || !CHARACTERS[key]) return;

      const char = CHARACTERS[key];
      const score = data.scores[key] || 0;

      const item = document.createElement("div");
      item.className = "progress-item";
      item.innerHTML = `
        <div class="progress-top">
          <div>
            <div class="progress-title">${char.title}</div>
            <div class="progress-name">${char.name || ""}</div>
          </div>
          <div>${score} / ${MAX_POINTS}</div>
        </div>
        <div class="bar">
          <div class="bar-fill ${char.fillClass}" style="width:${(score / MAX_POINTS) * 100}%"></div>
        </div>
      `;
      list.appendChild(item);
    }

    function renderDots(score) {
      const dots = document.getElementById("dots");
      dots.innerHTML = "";
      for (let i = 0; i < MAX_POINTS; i++) {
        const el = document.createElement("div");
        el.className = "dot" + (i < score ? " active" : "");
        dots.appendChild(el);
      }
    }

    function renderCharacterView(data, message = "") {
      const selected = data.selectedCharacter;
      const char = CHARACTERS[selected];
      const score = data.scores[selected];

      setCharacterBackground(selected);

      const avatar = document.getElementById("avatar");
      avatar.className = `avatar-wrap ${char.themeClass}`;
      avatar.textContent = char.icon;

      document.getElementById("avatarTitle").textContent = char.title;
      document.getElementById("avatarName").textContent = char.name || "";
      document.getElementById("avatarSub").textContent = char.desc;

      const resultText = document.getElementById("resultText");
      resultText.textContent = message;
      resultText.classList.remove("flash", "signal-text");
      void resultText.offsetWidth;
      if (message) resultText.classList.add("flash", "signal-text");

      renderDots(score);
      buildProgressList(data);
    }

    function selectCharacter(characterKey) {
      const data = loadData();
      data.selectedCharacter = characterKey;
      saveData(data);

      buildSelectCards();
      showScreen("mainScreen");
      nudgeScrollSpace();
      renderCharacterView(
        data,
        `已選擇 ${CHARACTERS[characterKey].title}${CHARACTERS[characterKey].name ? `・${CHARACTERS[characterKey].name}` : ""}`
      );
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function playAnimationAndAddPoint() {
      const data = loadData();
      const selected = data.selectedCharacter;
      const now = Date.now();

      showScreen("mainScreen");
      nudgeScrollSpace();

      if (!selected) {
        setSelectBackground();
        showScreen("selectScreen");
        buildSelectCards();
        return;
      }

      const char = CHARACTERS[selected];

      renderCharacterView(data, "");

      if (data.scores[selected] >= MAX_POINTS) {
        renderCharacterView(data, `已完成 ${MAX_POINTS} / ${MAX_POINTS}`);
        await wait(1200);
        window.location.href = NEXT_URL;
        return;
      }

      if (now - data.lastScanTime < COOLDOWN_MS) {
        const remain = Math.ceil((COOLDOWN_MS - (now - data.lastScanTime)) / 1000);
        renderCharacterView(data, `冷卻中，請 ${remain} 秒後再掃`);
        return;
      }

      const avatar = document.getElementById("avatar");
      avatar.classList.remove("animate-1", "animate-2", "animate-3", "animate-4", "animate-5", "animate-6");
      void avatar.offsetWidth;
      avatar.classList.add(char.animClass);

      renderCharacterView(
        data,
        `已辨識 ${char.title}${char.name ? `・${char.name}` : ""}，播放動畫中...`
      );

      await wait(1200);

      data.scores[selected] = Math.min(data.scores[selected] + 1, MAX_POINTS);
      data.lastScanTime = now;
      saveData(data);

      const updatedScore = data.scores[selected];
      renderCharacterView(data, `+1 點！目前 ${updatedScore} / ${MAX_POINTS}`);
      buildSelectCards();

      if (updatedScore >= MAX_POINTS) {
        await wait(1400);
        renderCharacterView(data, "已集滿 3 點，準備跳轉...");
        await wait(1200);
        window.location.href = NEXT_URL;
      }
    }

    function nudgeScrollSpace() {
      if (window.innerWidth > 900) return;
      requestAnimationFrame(() => {
        const target = Math.min(120, Math.max(56, Math.round(window.innerHeight * 0.16)));
        window.scrollTo({ top: target, behavior: "smooth" });
      });
    }

    function renderNormalMain() {
      const data = loadData();
      if (!data.selectedCharacter) {
        setSelectBackground();
        showScreen("selectScreen");
        buildSelectCards();
        return;
      }
      showScreen("mainScreen");
      nudgeScrollSpace();
      renderCharacterView(data, "");
    }

    function resetCurrentCharacterPoints() {
      const data = loadData();
      if (!data.selectedCharacter) return;
      data.scores[data.selectedCharacter] = 0;
      saveData(data);
      buildSelectCards();
      renderNormalMain();
    }

    function reselectCharacter() {
      const data = loadData();
      data.selectedCharacter = null;
      saveData(data);
      setSelectBackground();
      buildSelectCards();
      showScreen("selectScreen");
    }

    function init() {
      buildSelectCards();

      document.getElementById("resetCurrentBtn").addEventListener("click", resetCurrentCharacterPoints);
      document.getElementById("reselectBtn").addEventListener("click", reselectCharacter);
      document.getElementById("clearAllBtn").addEventListener("click", () => {
        clearData();
        location.reload();
      });
      document.getElementById("clearAllFromSelect").addEventListener("click", () => {
        clearData();
        location.reload();
      });

      const data = loadData();
      const isScanEvent = getIsScanEvent();

      if (!data.selectedCharacter) {
        setSelectBackground();
        showScreen("selectScreen");
        buildSelectCards();
        return;
      }

      if (isScanEvent) {
        playAnimationAndAddPoint();
      } else {
        renderNormalMain();
      }

      checkOrientation();
    }

    init();
  </script>
</body>
</html>
